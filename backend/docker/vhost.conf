# Virtual host Apache untuk Laravel. __PORT__ diganti oleh entrypoint.sh
# dengan port yang diberikan Render ($PORT).
<VirtualHost *:__PORT__>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>

    # Arahkan log ke stdout/stderr agar muncul di dashboard Render.
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
