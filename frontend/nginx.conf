server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA rewrite: semua path tak dikenal → index.html (wajib untuk React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache aset statis ber-hash dari Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
